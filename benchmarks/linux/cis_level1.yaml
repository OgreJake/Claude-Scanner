# CIS Ubuntu Linux 22.04 LTS Benchmark — Level 1
# Source: CIS Benchmark v1.0.0
# These checks cover the most critical hardening controls.

benchmark_name: "CIS Ubuntu Linux 22.04 LTS"
benchmark_version: "1.0.0"

checks:

  # ---------------------------------------------------------------------------
  # 1.1 Filesystem Configuration
  # ---------------------------------------------------------------------------
  - id: "linux.1.1.1"
    section: "1.1 Filesystem Configuration"
    title: "Ensure /tmp is configured as a separate partition"
    description: "The /tmp directory is a world-writable directory used for temporary file storage."
    rationale: "Configuring /tmp as a separate partition allows noexec,nosuid,nodev mount options."
    remediation: "Create a separate partition for /tmp or configure systemd's tmp.mount."
    severity: medium
    os_type: linux
    check_type: command
    check_command: "findmnt -n /tmp 2>/dev/null || grep -E '\\s/tmp\\s' /etc/fstab 2>/dev/null"
    expected_regex: "tmpfs|/tmp"
    level: 1

  - id: "linux.1.1.2"
    section: "1.1 Filesystem Configuration"
    title: "Ensure nodev option set on /tmp partition"
    description: "The nodev mount option specifies that the filesystem cannot contain special devices."
    remediation: "Add nodev option to /tmp in /etc/fstab."
    severity: low
    os_type: linux
    check_type: command
    check_command: "findmnt -n /tmp | grep -o 'nodev'"
    expected_output: "nodev"
    level: 1

  - id: "linux.1.1.3"
    section: "1.1 Filesystem Configuration"
    title: "Ensure nosuid option set on /tmp partition"
    remediation: "Add nosuid option to /tmp in /etc/fstab."
    severity: low
    os_type: linux
    check_type: command
    check_command: "findmnt -n /tmp | grep -o 'nosuid'"
    expected_output: "nosuid"
    level: 1

  - id: "linux.1.1.4"
    section: "1.1 Filesystem Configuration"
    title: "Ensure noexec option set on /tmp partition"
    remediation: "Add noexec option to /tmp in /etc/fstab."
    severity: medium
    os_type: linux
    check_type: command
    check_command: "findmnt -n /tmp | grep -o 'noexec'"
    expected_output: "noexec"
    level: 1

  # ---------------------------------------------------------------------------
  # 1.5 Bootloader Configuration
  # ---------------------------------------------------------------------------
  - id: "linux.1.5.1"
    section: "1.5 Bootloader Configuration"
    title: "Ensure bootloader password is set"
    description: "Setting a password for GRUB prevents unauthorized modifications to boot options."
    remediation: "Run grub-mkpasswd-pbkdf2 and add password to /etc/grub.d/40_custom."
    severity: high
    os_type: linux
    check_type: command
    check_command: "grep -E '^(password|password_pbkdf2)' /boot/grub/grub.cfg 2>/dev/null || grep -E '^(password|password_pbkdf2)' /boot/grub2/grub.cfg 2>/dev/null"
    expected_regex: "password"
    level: 1

  - id: "linux.1.5.2"
    section: "1.5 Bootloader Configuration"
    title: "Ensure permissions on bootloader config are not overridden"
    remediation: "chmod og-rwx /boot/grub/grub.cfg"
    severity: medium
    os_type: linux
    check_type: command
    check_command: "stat -c '%a %u %g' /boot/grub/grub.cfg 2>/dev/null || stat -c '%a %u %g' /boot/grub2/grub.cfg 2>/dev/null"
    expected_regex: "^[46]00 0 0"
    level: 1

  # ---------------------------------------------------------------------------
  # 1.6 SELinux / AppArmor
  # ---------------------------------------------------------------------------
  - id: "linux.1.6.1"
    section: "1.6 Mandatory Access Control"
    title: "Ensure AppArmor is installed"
    remediation: "apt install apparmor apparmor-profiles"
    severity: high
    os_type: linux
    check_type: command
    check_command: "dpkg -l apparmor 2>/dev/null | grep -c '^ii' || rpm -q apparmor 2>/dev/null"
    expected_regex: "^[1-9]|apparmor-[0-9]"
    level: 1

  - id: "linux.1.6.2"
    section: "1.6 Mandatory Access Control"
    title: "Ensure AppArmor is enabled in the bootloader configuration"
    remediation: "Add apparmor=1 security=apparmor to GRUB_CMDLINE_LINUX in /etc/default/grub."
    severity: high
    os_type: linux
    check_type: command
    check_command: "grep -E 'apparmor=1' /proc/cmdline"
    expected_output: "apparmor=1"
    level: 1

  # ---------------------------------------------------------------------------
  # 2.1 Special Purpose Services
  # ---------------------------------------------------------------------------
  - id: "linux.2.1.1"
    section: "2.1 Special Purpose Services"
    title: "Ensure time synchronization is in use"
    remediation: "apt install ntp || systemctl enable systemd-timesyncd"
    severity: low
    os_type: linux
    check_type: command
    check_command: "systemctl is-active ntp 2>/dev/null || systemctl is-active ntpd 2>/dev/null || systemctl is-active chronyd 2>/dev/null || systemctl is-active systemd-timesyncd 2>/dev/null"
    expected_output: "active"
    level: 1

  - id: "linux.2.1.2"
    section: "2.1 Special Purpose Services"
    title: "Ensure X Window System is not installed"
    remediation: "apt purge xserver-xorg*"
    severity: medium
    os_type: linux
    check_type: command
    check_command: "dpkg -l xserver-xorg 2>/dev/null | grep -c '^ii' || echo '0'"
    expected_output: "0"
    level: 1

  - id: "linux.2.1.3"
    section: "2.1 Special Purpose Services"
    title: "Ensure Avahi Server is not installed"
    remediation: "apt purge avahi-daemon"
    severity: medium
    os_type: linux
    check_type: service
    check_command: "avahi-daemon"
    expected_output: "inactive"
    level: 1

  - id: "linux.2.1.4"
    section: "2.1 Special Purpose Services"
    title: "Ensure CUPS is not installed"
    remediation: "apt purge cups"
    severity: low
    os_type: linux
    check_type: service
    check_command: "cups"
    expected_output: "inactive"
    level: 1

  - id: "linux.2.1.5"
    section: "2.1 Special Purpose Services"
    title: "Ensure DHCP Server is not installed"
    remediation: "apt purge isc-dhcp-server"
    severity: high
    os_type: linux
    check_type: command
    check_command: "systemctl is-active isc-dhcp-server 2>/dev/null; systemctl is-active dhcpd 2>/dev/null; echo 'done'"
    expected_regex: "inactive|not-found|done"
    level: 1

  # ---------------------------------------------------------------------------
  # 3.1 Network Parameters
  # ---------------------------------------------------------------------------
  - id: "linux.3.1.1"
    section: "3.1 Network Parameters"
    title: "Ensure IP forwarding is disabled"
    description: "IP forwarding allows a system to act as a router between networks."
    remediation: "Add net.ipv4.ip_forward=0 to /etc/sysctl.conf"
    severity: high
    os_type: linux
    check_type: command
    check_command: "sysctl net.ipv4.ip_forward"
    expected_output: "net.ipv4.ip_forward = 0"
    level: 1

  - id: "linux.3.1.2"
    section: "3.1 Network Parameters"
    title: "Ensure packet redirect sending is disabled"
    remediation: "Add net.ipv4.conf.all.send_redirects=0 to /etc/sysctl.conf"
    severity: medium
    os_type: linux
    check_type: command
    check_command: "sysctl net.ipv4.conf.all.send_redirects"
    expected_output: "net.ipv4.conf.all.send_redirects = 0"
    level: 1

  - id: "linux.3.2.1"
    section: "3.2 Network Parameters (Host and Router)"
    title: "Ensure source routed packets are not accepted"
    remediation: "Add net.ipv4.conf.all.accept_source_route=0 to /etc/sysctl.conf"
    severity: medium
    os_type: linux
    check_type: command
    check_command: "sysctl net.ipv4.conf.all.accept_source_route"
    expected_output: "net.ipv4.conf.all.accept_source_route = 0"
    level: 1

  - id: "linux.3.2.2"
    section: "3.2 Network Parameters"
    title: "Ensure ICMP redirects are not accepted"
    remediation: "Add net.ipv4.conf.all.accept_redirects=0 to /etc/sysctl.conf"
    severity: medium
    os_type: linux
    check_type: command
    check_command: "sysctl net.ipv4.conf.all.accept_redirects"
    expected_output: "net.ipv4.conf.all.accept_redirects = 0"
    level: 1

  - id: "linux.3.2.3"
    section: "3.2 Network Parameters"
    title: "Ensure secure ICMP redirects are not accepted"
    remediation: "Add net.ipv4.conf.all.secure_redirects=0 to /etc/sysctl.conf"
    severity: medium
    os_type: linux
    check_type: command
    check_command: "sysctl net.ipv4.conf.all.secure_redirects"
    expected_output: "net.ipv4.conf.all.secure_redirects = 0"
    level: 1

  - id: "linux.3.2.4"
    section: "3.2 Network Parameters"
    title: "Ensure suspicious packets are logged"
    remediation: "Add net.ipv4.conf.all.log_martians=1 to /etc/sysctl.conf"
    severity: low
    os_type: linux
    check_type: command
    check_command: "sysctl net.ipv4.conf.all.log_martians"
    expected_output: "net.ipv4.conf.all.log_martians = 1"
    level: 1

  # ---------------------------------------------------------------------------
  # 3.4 Firewall
  # ---------------------------------------------------------------------------
  - id: "linux.3.4.1"
    section: "3.4 Firewall Configuration"
    title: "Ensure a firewall package is installed"
    remediation: "apt install ufw || apt install iptables"
    severity: high
    os_type: linux
    check_type: command
    check_command: "dpkg -l ufw 2>/dev/null | grep -c '^ii' || dpkg -l iptables 2>/dev/null | grep -c '^ii' || rpm -q firewalld 2>/dev/null"
    expected_regex: "^[1-9]|firewalld-"
    level: 1

  - id: "linux.3.4.2"
    section: "3.4 Firewall Configuration"
    title: "Ensure ufw is enabled"
    remediation: "ufw enable"
    severity: high
    os_type: linux
    check_type: command
    check_command: "ufw status 2>/dev/null"
    expected_regex: "Status: active"
    level: 1

  # ---------------------------------------------------------------------------
  # 4.1 Logging
  # ---------------------------------------------------------------------------
  - id: "linux.4.1.1"
    section: "4.1 Configure System Accounting (auditd)"
    title: "Ensure auditd is installed"
    remediation: "apt install auditd audispd-plugins"
    severity: high
    os_type: linux
    check_type: command
    check_command: "dpkg -l auditd 2>/dev/null | grep -c '^ii' || rpm -q audit 2>/dev/null"
    expected_regex: "^[1-9]|audit-[0-9]"
    level: 1

  - id: "linux.4.1.2"
    section: "4.1 Configure System Accounting (auditd)"
    title: "Ensure auditd service is enabled and running"
    remediation: "systemctl enable auditd && systemctl start auditd"
    severity: high
    os_type: linux
    check_type: service
    check_command: "auditd"
    expected_output: "active"
    level: 1

  - id: "linux.4.2.1"
    section: "4.2 Configure Logging"
    title: "Ensure rsyslog is installed"
    remediation: "apt install rsyslog"
    severity: medium
    os_type: linux
    check_type: command
    check_command: "dpkg -l rsyslog 2>/dev/null | grep -c '^ii' || rpm -q rsyslog 2>/dev/null"
    expected_regex: "^[1-9]|rsyslog-"
    level: 1

  # ---------------------------------------------------------------------------
  # 5.1 SSH Server
  # ---------------------------------------------------------------------------
  - id: "linux.5.1.1"
    section: "5.1 Configure SSH Server"
    title: "Ensure SSH Protocol is set to 2"
    remediation: "Set Protocol 2 in /etc/ssh/sshd_config"
    severity: high
    os_type: linux
    check_type: file_content
    check_command: "/etc/ssh/sshd_config"
    expected_regex: "^Protocol\\s+2"
    level: 1

  - id: "linux.5.1.2"
    section: "5.1 Configure SSH Server"
    title: "Ensure SSH root login is disabled"
    remediation: "Set PermitRootLogin no in /etc/ssh/sshd_config"
    severity: critical
    os_type: linux
    check_type: file_content
    check_command: "/etc/ssh/sshd_config"
    expected_regex: "^PermitRootLogin\\s+no"
    level: 1

  - id: "linux.5.1.3"
    section: "5.1 Configure SSH Server"
    title: "Ensure SSH PermitEmptyPasswords is disabled"
    remediation: "Set PermitEmptyPasswords no in /etc/ssh/sshd_config"
    severity: critical
    os_type: linux
    check_type: file_content
    check_command: "/etc/ssh/sshd_config"
    expected_regex: "^PermitEmptyPasswords\\s+no"
    level: 1

  - id: "linux.5.1.4"
    section: "5.1 Configure SSH Server"
    title: "Ensure SSH MaxAuthTries is set to 4 or less"
    remediation: "Set MaxAuthTries 4 in /etc/ssh/sshd_config"
    severity: medium
    os_type: linux
    check_type: command
    check_command: "grep -E '^MaxAuthTries' /etc/ssh/sshd_config | awk '{print $2}'"
    expected_regex: "^[1-4]$"
    level: 1

  - id: "linux.5.1.5"
    section: "5.1 Configure SSH Server"
    title: "Ensure SSH LoginGraceTime is set to one minute or less"
    remediation: "Set LoginGraceTime 60 in /etc/ssh/sshd_config"
    severity: low
    os_type: linux
    check_type: command
    check_command: "grep -E '^LoginGraceTime' /etc/ssh/sshd_config | awk '{print $2}'"
    expected_regex: "^([1-9]|[1-5][0-9]|60)$"
    level: 1

  - id: "linux.5.1.6"
    section: "5.1 Configure SSH Server"
    title: "Ensure SSH warning banner is configured"
    remediation: "Set Banner /etc/issue.net in /etc/ssh/sshd_config"
    severity: low
    os_type: linux
    check_type: file_content
    check_command: "/etc/ssh/sshd_config"
    expected_regex: "^Banner\\s+/etc/issue"
    level: 1

  # ---------------------------------------------------------------------------
  # 5.2 PAM
  # ---------------------------------------------------------------------------
  - id: "linux.5.2.1"
    section: "5.2 Configure PAM"
    title: "Ensure password creation requirements are configured"
    description: "libpam-pwquality provides password strength checking."
    remediation: "apt install libpam-pwquality && configure /etc/security/pwquality.conf"
    severity: medium
    os_type: linux
    check_type: command
    check_command: "grep -E 'minlen|dcredit|ucredit|lcredit' /etc/security/pwquality.conf 2>/dev/null | head -4"
    expected_regex: "minlen|dcredit|ucredit|lcredit"
    level: 1

  - id: "linux.5.2.2"
    section: "5.2 Configure PAM"
    title: "Ensure lockout for failed password attempts is configured"
    remediation: "Configure pam_faillock in /etc/pam.d/common-auth"
    severity: high
    os_type: linux
    check_type: command
    check_command: "grep -E 'pam_faillock|pam_tally2' /etc/pam.d/common-auth 2>/dev/null"
    expected_regex: "pam_faillock|pam_tally2"
    level: 1

  # ---------------------------------------------------------------------------
  # 5.3 Password Aging
  # ---------------------------------------------------------------------------
  - id: "linux.5.3.1"
    section: "5.3 User Accounts and Environment"
    title: "Ensure password expiration is 365 days or less"
    remediation: "Set PASS_MAX_DAYS 365 in /etc/login.defs"
    severity: medium
    os_type: linux
    check_type: command
    check_command: "grep -E '^PASS_MAX_DAYS' /etc/login.defs | awk '{print $2}'"
    expected_regex: "^([1-9][0-9]|[1-2][0-9]{2}|3[0-5][0-9]|36[0-5])$"
    level: 1

  - id: "linux.5.3.2"
    section: "5.3 User Accounts and Environment"
    title: "Ensure minimum days between password changes is 7 or more"
    remediation: "Set PASS_MIN_DAYS 7 in /etc/login.defs"
    severity: low
    os_type: linux
    check_type: command
    check_command: "grep -E '^PASS_MIN_DAYS' /etc/login.defs | awk '{print $2}'"
    expected_regex: "^([7-9]|[1-9][0-9]+)$"
    level: 1

  # ---------------------------------------------------------------------------
  # 6.1 System File Permissions
  # ---------------------------------------------------------------------------
  - id: "linux.6.1.1"
    section: "6.1 System File Permissions"
    title: "Ensure permissions on /etc/passwd are configured"
    remediation: "chmod 644 /etc/passwd && chown root:root /etc/passwd"
    severity: high
    os_type: linux
    check_type: command
    check_command: "stat -c '%a %u %g' /etc/passwd"
    expected_output: "644 0 0"
    level: 1

  - id: "linux.6.1.2"
    section: "6.1 System File Permissions"
    title: "Ensure permissions on /etc/shadow are configured"
    remediation: "chmod 640 /etc/shadow && chown root:shadow /etc/shadow"
    severity: critical
    os_type: linux
    check_type: command
    check_command: "stat -c '%a %u %g' /etc/shadow"
    expected_regex: "^(640|000) 0 (0|42)$"
    level: 1

  - id: "linux.6.1.3"
    section: "6.1 System File Permissions"
    title: "Ensure permissions on /etc/group are configured"
    remediation: "chmod 644 /etc/group && chown root:root /etc/group"
    severity: medium
    os_type: linux
    check_type: command
    check_command: "stat -c '%a %u %g' /etc/group"
    expected_output: "644 0 0"
    level: 1

  - id: "linux.6.1.4"
    section: "6.1 System File Permissions"
    title: "Ensure no world-writable files exist"
    description: "World-writable files can be modified by any user."
    remediation: "chmod o-w <file> for each world-writable file found."
    severity: high
    os_type: linux
    check_type: command
    check_command: "find / -xdev -type f -perm -0002 -not -path '/proc/*' -not -path '/sys/*' 2>/dev/null | wc -l"
    expected_output: "0"
    level: 1
