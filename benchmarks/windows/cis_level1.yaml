# CIS Microsoft Windows Server 2022 Benchmark — Level 1
# Source: CIS Benchmark v1.0.0

benchmark_name: "CIS Microsoft Windows Server 2022"
benchmark_version: "1.0.0"

checks:

  # ---------------------------------------------------------------------------
  # 1.1 Password Policy
  # ---------------------------------------------------------------------------
  - id: "windows.1.1.1"
    section: "1.1 Account Policies / Password Policy"
    title: "Ensure Enforce password history is set to 24 or more passwords"
    remediation: "Computer Configuration > Windows Settings > Security Settings > Account Policies > Password Policy > Enforce password history: 24"
    severity: medium
    os_type: windows
    check_type: command
    check_command: "(Get-ADDefaultDomainPasswordPolicy -ErrorAction SilentlyContinue).PasswordHistoryCount 2>$null; (net accounts 2>$null | Select-String 'Length of password history').ToString().Trim()"
    expected_regex: "^(2[4-9]|[3-9][0-9]|[1-9][0-9]{2,})|24 password"
    level: 1

  - id: "windows.1.1.2"
    section: "1.1 Account Policies / Password Policy"
    title: "Ensure Maximum password age is set to 365 or fewer days"
    remediation: "Set Maximum password age to 365 days or less via Local Security Policy."
    severity: medium
    os_type: windows
    check_type: command
    check_command: "net accounts | Select-String 'Maximum password age'"
    expected_regex: "([1-9][0-9]?|[1-2][0-9]{2}|3[0-5][0-9]|36[0-5]) days"
    level: 1

  - id: "windows.1.1.3"
    section: "1.1 Account Policies / Password Policy"
    title: "Ensure Minimum password length is set to 14 or more characters"
    remediation: "Set Minimum password length to 14 via Local Security Policy."
    severity: high
    os_type: windows
    check_type: command
    check_command: "net accounts | Select-String 'Minimum password length'"
    expected_regex: "1[4-9]|[2-9][0-9]"
    level: 1

  - id: "windows.1.1.4"
    section: "1.1 Account Policies / Password Policy"
    title: "Ensure Password must meet complexity requirements is set to Enabled"
    remediation: "Enable password complexity requirements via Local Security Policy."
    severity: high
    os_type: windows
    check_type: registry
    check_command: "HKLM:\\SYSTEM\\CurrentControlSet\\Control\\Lsa"
    expected_regex: "."
    level: 1

  # ---------------------------------------------------------------------------
  # 1.2 Account Lockout Policy
  # ---------------------------------------------------------------------------
  - id: "windows.1.2.1"
    section: "1.2 Account Policies / Account Lockout Policy"
    title: "Ensure Account lockout duration is set to 15 or more minutes"
    remediation: "Set Account lockout duration to 15 minutes via Local Security Policy."
    severity: medium
    os_type: windows
    check_type: command
    check_command: "net accounts | Select-String 'Lockout duration'"
    expected_regex: "1[5-9]|[2-9][0-9]|[1-9][0-9]{2}"
    level: 1

  - id: "windows.1.2.2"
    section: "1.2 Account Policies / Account Lockout Policy"
    title: "Ensure Account lockout threshold is set to 5 or fewer invalid logon attempts"
    remediation: "Set lockout threshold to 5 or fewer via Local Security Policy."
    severity: high
    os_type: windows
    check_type: command
    check_command: "net accounts | Select-String 'Lockout threshold'"
    expected_regex: "[1-5] logon"
    level: 1

  # ---------------------------------------------------------------------------
  # 2.2 User Rights Assignment
  # ---------------------------------------------------------------------------
  - id: "windows.2.2.1"
    section: "2.2 User Rights Assignment"
    title: "Ensure Access this computer from the network is set to Administrators, Authenticated Users"
    severity: high
    os_type: windows
    check_type: command
    check_command: "(Get-LocalGroupMember 'Administrators' -ErrorAction SilentlyContinue).Name -join ','"
    expected_regex: "Administrator"
    level: 1

  - id: "windows.2.2.2"
    section: "2.2 User Rights Assignment"
    title: "Ensure Deny log on locally includes Guests"
    remediation: "Configure Deny log on locally to include Guests via Local Security Policy."
    severity: medium
    os_type: windows
    check_type: command
    check_command: "net localgroup Guests | Select-String 'Guest'"
    expected_regex: "Guest"
    level: 1

  # ---------------------------------------------------------------------------
  # 2.3 Security Options
  # ---------------------------------------------------------------------------
  - id: "windows.2.3.1"
    section: "2.3 Security Options"
    title: "Ensure Accounts: Administrator account status is set to Disabled"
    remediation: "Disable the built-in Administrator account: net user Administrator /active:no"
    severity: high
    os_type: windows
    check_type: command
    check_command: "net user Administrator | Select-String 'Account active'"
    expected_output: "Account active               No"
    level: 1

  - id: "windows.2.3.2"
    section: "2.3 Security Options"
    title: "Ensure Accounts: Guest account status is set to Disabled"
    remediation: "net user Guest /active:no"
    severity: high
    os_type: windows
    check_type: command
    check_command: "net user Guest | Select-String 'Account active'"
    expected_output: "Account active               No"
    level: 1

  - id: "windows.2.3.3"
    section: "2.3 Security Options"
    title: "Ensure Interactive logon: Do not display last user name"
    remediation: "Set HKLM:\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Policies\\System\\DontDisplayLastUserName = 1"
    severity: low
    os_type: windows
    check_type: registry
    check_command: "HKLM:\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Policies\\System"
    expected_regex: "DontDisplayLastUserName.*1"
    level: 1

  - id: "windows.2.3.4"
    section: "2.3 Security Options"
    title: "Ensure Network access: Do not allow anonymous enumeration of SAM accounts is set to Enabled"
    remediation: "Set RestrictAnonymousSAM=1 in registry."
    severity: high
    os_type: windows
    check_type: command
    check_command: "(Get-ItemProperty 'HKLM:\\SYSTEM\\CurrentControlSet\\Control\\Lsa' -ErrorAction SilentlyContinue).RestrictAnonymousSAM"
    expected_output: "1"
    level: 1

  # ---------------------------------------------------------------------------
  # 9. Windows Firewall
  # ---------------------------------------------------------------------------
  - id: "windows.9.1.1"
    section: "9.1 Windows Firewall — Domain Profile"
    title: "Ensure Windows Firewall Domain profile is enabled"
    remediation: "Enable Windows Firewall for Domain profile via Group Policy or netsh."
    severity: high
    os_type: windows
    check_type: command
    check_command: "(Get-NetFirewallProfile -Profile Domain).Enabled"
    expected_output: "True"
    level: 1

  - id: "windows.9.2.1"
    section: "9.2 Windows Firewall — Private Profile"
    title: "Ensure Windows Firewall Private profile is enabled"
    severity: high
    os_type: windows
    check_type: command
    check_command: "(Get-NetFirewallProfile -Profile Private).Enabled"
    expected_output: "True"
    level: 1

  - id: "windows.9.3.1"
    section: "9.3 Windows Firewall — Public Profile"
    title: "Ensure Windows Firewall Public profile is enabled"
    severity: high
    os_type: windows
    check_type: command
    check_command: "(Get-NetFirewallProfile -Profile Public).Enabled"
    expected_output: "True"
    level: 1

  # ---------------------------------------------------------------------------
  # 18. Administrative Templates
  # ---------------------------------------------------------------------------
  - id: "windows.18.1.1"
    section: "18.1 Control Panel"
    title: "Ensure Prevent enabling lock screen camera is set to Enabled"
    severity: low
    os_type: windows
    check_type: registry
    check_command: "HKLM:\\SOFTWARE\\Policies\\Microsoft\\Windows\\Personalization"
    expected_regex: "NoLockScreenCamera.*1"
    level: 1

  - id: "windows.18.2.1"
    section: "18.2 MS Security Guide"
    title: "Ensure SMBv1 is disabled"
    description: "SMBv1 is an obsolete protocol vulnerable to EternalBlue/WannaCry."
    remediation: "Set-SmbServerConfiguration -EnableSMB1Protocol $false"
    severity: critical
    os_type: windows
    check_type: command
    check_command: "(Get-SmbServerConfiguration).EnableSMB1Protocol"
    expected_output: "False"
    level: 1

  - id: "windows.18.2.2"
    section: "18.2 MS Security Guide"
    title: "Ensure Windows Defender Antivirus Real-Time Protection is enabled"
    remediation: "Set-MpPreference -DisableRealtimeMonitoring $false"
    severity: critical
    os_type: windows
    check_type: command
    check_command: "(Get-MpPreference).DisableRealtimeMonitoring"
    expected_output: "False"
    level: 1

  - id: "windows.18.2.3"
    section: "18.2 MS Security Guide"
    title: "Ensure Windows Defender Antivirus definitions are up to date"
    severity: high
    os_type: windows
    check_type: command
    check_command: "((Get-Date) - (Get-MpComputerStatus).AntivirusSignatureLastUpdated).TotalDays"
    expected_regex: "^[0-6](\\.[0-9]+)?$"
    level: 1

  - id: "windows.18.3.1"
    section: "18.3 RDP"
    title: "Ensure Remote Desktop Services uses NLA"
    description: "Network Level Authentication requires authentication before RDP session is created."
    remediation: "Set UserAuthenticationRequired=1 in RDP registry."
    severity: high
    os_type: windows
    check_type: registry
    check_command: "HKLM:\\SYSTEM\\CurrentControlSet\\Control\\Terminal Server\\WinStations\\RDP-Tcp"
    expected_regex: "UserAuthenticationRequired.*1"
    level: 1

  - id: "windows.18.3.2"
    section: "18.3 RDP"
    title: "Ensure RDP session encryption level is set to High"
    remediation: "Set MinEncryptionLevel=3 in RDP registry."
    severity: high
    os_type: windows
    check_type: registry
    check_command: "HKLM:\\SYSTEM\\CurrentControlSet\\Control\\Terminal Server\\WinStations\\RDP-Tcp"
    expected_regex: "MinEncryptionLevel.*3"
    level: 1
