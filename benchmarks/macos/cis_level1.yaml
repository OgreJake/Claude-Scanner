# CIS Apple macOS 14.0 Sonoma Benchmark — Level 1
# Source: CIS Benchmark v1.0.0

benchmark_name: "CIS Apple macOS 14.0 Sonoma"
benchmark_version: "1.0.0"

checks:

  # ---------------------------------------------------------------------------
  # 1. Install Updates, Patches, and Additional Security Software
  # ---------------------------------------------------------------------------
  - id: "macos.1.1"
    section: "1. Software Updates"
    title: "Ensure all Apple-provided software is current"
    description: "All available Apple-provided updates should be applied."
    remediation: "System Settings > General > Software Update — install all updates."
    severity: high
    os_type: darwin
    check_type: command
    check_command: "softwareupdate -l 2>&1 | grep -c 'No new software available' || softwareupdate -l 2>&1 | grep -c '\\*'"
    expected_output: "1"
    level: 1

  - id: "macos.1.2"
    section: "1. Software Updates"
    title: "Ensure automatic software update checking is enabled"
    remediation: "defaults write /Library/Preferences/com.apple.SoftwareUpdate AutomaticCheckEnabled -bool TRUE"
    severity: medium
    os_type: darwin
    check_type: command
    check_command: "defaults read /Library/Preferences/com.apple.SoftwareUpdate AutomaticCheckEnabled 2>/dev/null"
    expected_output: "1"
    level: 1

  - id: "macos.1.3"
    section: "1. Software Updates"
    title: "Ensure automatic security updates are enabled"
    remediation: "defaults write /Library/Preferences/com.apple.SoftwareUpdate CriticalUpdateInstall -bool TRUE"
    severity: high
    os_type: darwin
    check_type: command
    check_command: "defaults read /Library/Preferences/com.apple.SoftwareUpdate CriticalUpdateInstall 2>/dev/null"
    expected_output: "1"
    level: 1

  # ---------------------------------------------------------------------------
  # 2. System Preferences
  # ---------------------------------------------------------------------------
  - id: "macos.2.1.1"
    section: "2.1 Bluetooth"
    title: "Ensure Bluetooth is disabled if no paired devices exist"
    remediation: "System Settings > Bluetooth — Turn Bluetooth Off if unused."
    severity: low
    os_type: darwin
    check_type: command
    check_command: "defaults read /Library/Preferences/com.apple.Bluetooth ControllerPowerState 2>/dev/null"
    expected_output: "0"
    level: 1

  - id: "macos.2.2.1"
    section: "2.2 Date & Time"
    title: "Ensure time is set within appropriate limits"
    remediation: "Enable automatic time synchronization in System Settings > General > Date & Time."
    severity: low
    os_type: darwin
    check_type: command
    check_command: "systemsetup -getusingnetworktime 2>/dev/null"
    expected_output: "Network Time: On"
    level: 1

  - id: "macos.2.3.1"
    section: "2.3 Desktop & Screen Saver"
    title: "Ensure screen saver timeout is 20 minutes or less"
    remediation: "Set screen saver idle time via System Settings > Lock Screen."
    severity: low
    os_type: darwin
    check_type: command
    check_command: "defaults -currentHost read com.apple.screensaver idleTime 2>/dev/null"
    expected_regex: "^([1-9][0-9]{1,2}|1[01][0-9]{2}|1200)$"
    level: 1

  - id: "macos.2.3.2"
    section: "2.3 Desktop & Screen Saver"
    title: "Ensure password is required to wake computer from sleep or screensaver"
    remediation: "defaults write com.apple.screensaver askForPassword -int 1"
    severity: medium
    os_type: darwin
    check_type: command
    check_command: "defaults read com.apple.screensaver askForPassword 2>/dev/null"
    expected_output: "1"
    level: 1

  - id: "macos.2.4.1"
    section: "2.4 Sharing"
    title: "Ensure Remote Apple Events is disabled"
    remediation: "systemsetup -setremoteappleevents off"
    severity: medium
    os_type: darwin
    check_type: command
    check_command: "systemsetup -getremoteappleevents 2>/dev/null"
    expected_output: "Remote Apple Events: Off"
    level: 1

  - id: "macos.2.4.2"
    section: "2.4 Sharing"
    title: "Ensure Internet Sharing is disabled"
    remediation: "System Settings > General > Sharing — disable Internet Sharing."
    severity: medium
    os_type: darwin
    check_type: command
    check_command: "defaults read /Library/Preferences/SystemConfiguration/com.apple.nat NAT 2>/dev/null | grep -c 'Enabled = 1' || echo '0'"
    expected_output: "0"
    level: 1

  - id: "macos.2.4.3"
    section: "2.4 Sharing"
    title: "Ensure Screen Sharing is disabled"
    remediation: "System Settings > General > Sharing — disable Screen Sharing."
    severity: high
    os_type: darwin
    check_type: command
    check_command: "launchctl list com.apple.screensharing 2>/dev/null | grep -c 'com.apple.screensharing' || echo '0'"
    expected_output: "0"
    level: 1

  - id: "macos.2.4.4"
    section: "2.4 Sharing"
    title: "Ensure Printer Sharing is disabled"
    remediation: "System Settings > General > Sharing — disable Printer Sharing."
    severity: low
    os_type: darwin
    check_type: command
    check_command: "cupsctl 2>/dev/null | grep -c '_share_printers=1' || echo '0'"
    expected_output: "0"
    level: 1

  - id: "macos.2.4.5"
    section: "2.4 Sharing"
    title: "Ensure Remote Login (SSH) is disabled"
    description: "Disable SSH if not required for remote management."
    remediation: "systemsetup -setremotelogin off"
    severity: medium
    os_type: darwin
    check_type: command
    check_command: "systemsetup -getremotelogin 2>/dev/null"
    expected_output: "Remote Login: Off"
    level: 1

  # ---------------------------------------------------------------------------
  # 3. Logging and Auditing
  # ---------------------------------------------------------------------------
  - id: "macos.3.1"
    section: "3. Logging and Auditing"
    title: "Ensure security auditing is enabled"
    remediation: "launchctl load -w /System/Library/LaunchDaemons/com.apple.auditd.plist"
    severity: high
    os_type: darwin
    check_type: command
    check_command: "launchctl list com.apple.auditd 2>/dev/null | grep -c 'com.apple.auditd'"
    expected_output: "1"
    level: 1

  - id: "macos.3.2"
    section: "3. Logging and Auditing"
    title: "Ensure install.log retention is 365 or more days"
    remediation: "Edit /etc/asl/com.apple.install to set ttl=365."
    severity: low
    os_type: darwin
    check_type: command
    check_command: "grep -E 'ttl' /etc/asl/com.apple.install 2>/dev/null"
    expected_regex: "ttl=([3-9][0-9]{2}|[1-9][0-9]{3,})"
    level: 1

  # ---------------------------------------------------------------------------
  # 4. Network Configurations
  # ---------------------------------------------------------------------------
  - id: "macos.4.1"
    section: "4. Network Configurations"
    title: "Ensure Bonjour advertising services is disabled"
    remediation: "defaults write /Library/Preferences/com.apple.mDNSResponder.plist NoMulticastAdvertisements -bool YES"
    severity: medium
    os_type: darwin
    check_type: command
    check_command: "defaults read /Library/Preferences/com.apple.mDNSResponder.plist NoMulticastAdvertisements 2>/dev/null"
    expected_output: "1"
    level: 1

  - id: "macos.4.2"
    section: "4. Network Configurations"
    title: "Ensure HTTP server is disabled"
    remediation: "sudo apachectl stop && sudo launchctl unload -w /System/Library/LaunchDaemons/org.apache.httpd.plist"
    severity: medium
    os_type: darwin
    check_type: command
    check_command: "launchctl list org.apache.httpd 2>/dev/null | grep -c 'org.apache.httpd' || echo '0'"
    expected_output: "0"
    level: 1

  - id: "macos.4.3"
    section: "4. Network Configurations"
    title: "Ensure NFS server is disabled"
    remediation: "nfsd disable && launchctl unload /System/Library/LaunchDaemons/com.apple.nfsd.plist"
    severity: medium
    os_type: darwin
    check_type: command
    check_command: "launchctl list com.apple.nfsd 2>/dev/null | grep -c 'com.apple.nfsd' || echo '0'"
    expected_output: "0"
    level: 1

  # ---------------------------------------------------------------------------
  # 5. System Access, Authentication, and Authorization
  # ---------------------------------------------------------------------------
  - id: "macos.5.1.1"
    section: "5.1 File System Permissions"
    title: "Ensure home folder is not public"
    remediation: "chmod 700 ~"
    severity: medium
    os_type: darwin
    check_type: command
    check_command: "ls -la /Users | awk 'NR>1 && $1 ~ /^d/ && $9 != \".\" && $9 != \"..\" && $9 != \"Shared\" && substr($1,8,1)==\"r\" {print $9}'"
    expected_output: ""
    level: 1

  - id: "macos.5.2.1"
    section: "5.2 Password Management"
    title: "Ensure complex passwords are required"
    remediation: "pwpolicy -setaccountpolicies"
    severity: high
    os_type: darwin
    check_type: command
    check_command: "pwpolicy -getaccountpolicies 2>/dev/null | grep -c 'minLength\\|requiresAlpha\\|requiresNumeric' || defaults read /Library/Managed\\ Preferences/com.apple.mobiledevice.passwordpolicy 2>/dev/null | grep -c 'requireAlphanumeric'"
    expected_regex: "^[1-9]"
    level: 1

  - id: "macos.5.3.1"
    section: "5.3 System Preferences Security"
    title: "Ensure System Preferences is secured"
    description: "System Preferences should require admin auth for critical changes."
    remediation: "security authorizationdb read system.preferences > /tmp/system.preferences.plist"
    severity: medium
    os_type: darwin
    check_type: command
    check_command: "security authorizationdb read system.preferences 2>/dev/null | grep -A2 'shared' | grep 'false' | head -1"
    expected_regex: "false"
    level: 1

  # ---------------------------------------------------------------------------
  # 6. User Accounts and Environment
  # ---------------------------------------------------------------------------
  - id: "macos.6.1.1"
    section: "6. User Accounts and Environment"
    title: "Ensure login window displays name and password fields"
    remediation: "defaults write /Library/Preferences/com.apple.loginwindow SHOWFULLNAME -bool true"
    severity: low
    os_type: darwin
    check_type: command
    check_command: "defaults read /Library/Preferences/com.apple.loginwindow SHOWFULLNAME 2>/dev/null"
    expected_output: "1"
    level: 1

  - id: "macos.6.1.2"
    section: "6. User Accounts and Environment"
    title: "Ensure guest account is disabled"
    remediation: "defaults write /Library/Preferences/com.apple.loginwindow GuestEnabled -bool NO"
    severity: medium
    os_type: darwin
    check_type: command
    check_command: "defaults read /Library/Preferences/com.apple.loginwindow GuestEnabled 2>/dev/null"
    expected_output: "0"
    level: 1

  - id: "macos.6.1.3"
    section: "6. User Accounts and Environment"
    title: "Ensure automatic login is disabled"
    remediation: "defaults delete /Library/Preferences/com.apple.loginwindow autoLoginUser"
    severity: high
    os_type: darwin
    check_type: command
    check_command: "defaults read /Library/Preferences/com.apple.loginwindow autoLoginUser 2>/dev/null | wc -c | tr -d ' '"
    expected_output: "1"
    level: 1

  # ---------------------------------------------------------------------------
  # 7. Additional Security
  # ---------------------------------------------------------------------------
  - id: "macos.7.1"
    section: "7. Additional Security"
    title: "Ensure Gatekeeper is enabled"
    description: "Gatekeeper enforces code-signing requirements for downloaded applications."
    remediation: "spctl --master-enable"
    severity: critical
    os_type: darwin
    check_type: command
    check_command: "spctl --status 2>/dev/null"
    expected_output: "assessments enabled"
    level: 1

  - id: "macos.7.2"
    section: "7. Additional Security"
    title: "Ensure FileVault is enabled"
    description: "FileVault provides full-disk encryption for macOS."
    remediation: "Enable FileVault in System Settings > Privacy & Security > FileVault."
    severity: critical
    os_type: darwin
    check_type: command
    check_command: "fdesetup status 2>/dev/null"
    expected_output: "FileVault is On."
    level: 1

  - id: "macos.7.3"
    section: "7. Additional Security"
    title: "Ensure System Integrity Protection status is enabled"
    description: "SIP protects system files and directories from modification."
    remediation: "Boot into Recovery Mode and run: csrutil enable"
    severity: critical
    os_type: darwin
    check_type: command
    check_command: "csrutil status 2>/dev/null"
    expected_output: "System Integrity Protection status: enabled."
    level: 1

  - id: "macos.7.4"
    section: "7. Additional Security"
    title: "Ensure XProtect is up to date"
    description: "XProtect provides malware detection in macOS."
    remediation: "Ensure automatic security updates are enabled."
    severity: high
    os_type: darwin
    check_type: command
    check_command: "system_profiler SPInstallHistoryDataType 2>/dev/null | grep -A3 'XProtect' | grep 'Install Date' | tail -1"
    expected_regex: "Install Date"
    level: 1
